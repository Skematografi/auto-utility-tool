name: Deploy to GitHub Pages with Analytics

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject GA_MEASUREMENT_ID
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
        run: |
          echo "Step 1: Read GA_MEASUREMENT_ID from secrets"
          GA_ID="${GA_MEASUREMENT_ID}"
          
          echo "Step 2: Validate GA_MEASUREMENT_ID"
          if [ -z "$GA_ID" ] || [ "$GA_ID" == "" ]; then
            echo "⚠️ WARNING: GA_MEASUREMENT_ID secret not found or empty!"
            GA_ID="G_PLACEHOLDER"
          else
            echo "✓ GA_MEASUREMENT_ID found (first 10 chars): ${GA_ID:0:10}..."
          fi
          
          echo "Step 3: Generate js/env.js"
          cat > js/env.js << EOF
          /**
           * Environment Variables
           * Auto-generated during GitHub Actions build
           */
          window.ENV = {
            GA_MEASUREMENT_ID: '${GA_ID}',
          };
          EOF
          
          echo "Step 4: Verify generated file"
          cat js/env.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4