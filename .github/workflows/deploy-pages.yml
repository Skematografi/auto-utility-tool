name: Deploy to GitHub Pages with Analytics

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject GA_MEASUREMENT_ID
        run: |
          GA_ID="${{ secrets.GA_MEASUREMENT_ID }}"
          
          if [ -z "$GA_ID" ] || [ "$GA_ID" == "" ]; then
            echo "⚠️ GA_MEASUREMENT_ID secret not found!"
            GA_ID="G_PLACEHOLDER"
          fi
          
          cat > js/env.js << EOF
          window.ENV = {
            GA_MEASUREMENT_ID: '${GA_ID}',
          };
          EOF
          
          echo "✓ js/env.js generated successfully"
          cat js/env.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4